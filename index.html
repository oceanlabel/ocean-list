<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCEAN LABEL</title>
    <style>
        :root { --bg: #050505; --text: #ffffff; --accent: #2D7FF9; --card-bg: rgba(255, 255, 255, 0.05); --border: #333; }
        [data-theme='light'] { --bg: #f1f5f9; --text: #1e293b; --accent: #312e81; --card-bg: #ffffff; --border: #e2e8f0; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); padding: 15px; max-width: 600px; margin: auto; }

        .header-wrap { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
        .header h1 { font-size: 1.3rem; font-weight: 900; cursor: pointer; }
        #theme-toggle { padding: 5px 10px; font-size: 0.7rem; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; }

        #search { width: 100%; background: var(--card-bg); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; margin-bottom: 15px; outline: none; }
        .filters { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; justify-content: center; }
        .btn { padding: 6px 10px; background: var(--card-bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; cursor: pointer; font-size: 0.7rem; }
        .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* 모바일 2단 핵심 설정 */
        .list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        
        .card { background: var(--card-bg); padding: 8px; border-radius: 8px; border: 1px solid var(--border); display: flex; align-items: center; gap: 6px; overflow: hidden; }
        .card img { width: 45px; height: 35px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
        .info { display: flex; flex-direction: column; overflow: hidden; justify-content: center; width: 100%; }
        .name { font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .price { color: var(--accent); font-weight: 700; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="header-wrap">
        <header class="header"><h1 onclick="resetAll()">OCEAN LABEL</h1></header>
        <button id="theme-toggle">MODE</button>
    </div>

    <input type="text" id="search" placeholder="시그 검색...">

    <div class="filters" id="categories">
        <button class="btn active" data-filter="all">ALL</button>
        <button class="btn" data-filter="1-5">1-5만</button>
        <button class="btn" data-filter="5-9">5-9만</button>
        <button class="btn" data-filter="10">10만대</button>
        <button class="btn" data-filter="20">20만↑</button>
        <button class="btn" data-filter="vip">VIP</button>
        <button class="btn" data-filter="personal">개인</button>
    </div>
