        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #2D7FF9;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: #333;
        }
        /* 고급스러운 딥 네이비 테마 */
        [data-theme='light'] {
            --bg: #f1f5f9;      /* 더 차분한 배경색 */
            --text: #1e293b;    /* 짙은 Slate 컬러 */
            --accent: #312e81;  /* 고급스러운 딥 네이비 포인트 */
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; max-width: 600px; margin: auto; }

        .header-wrap { display: flex; justify-content: space-between; align-items: center; margin: 30px 0 20px; }
        
        .header h1 { 
            font-size: 1.6rem; font-weight: 900; letter-spacing: -1.5px; text-transform: uppercase;
            cursor: pointer;
            background: linear-gradient(90deg, #2D7FF9, #ffffff, #2D7FF9);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        [data-theme='light'] .header h1 {
            background: linear-gradient(90deg, #312e81, #4338ca, #312e81);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        
        .equalizer { display: inline-flex; align-items: flex-end; gap: 3px; height: 20px; margin-left: 10px; vertical-align: middle; }
        .bar { width: 4px; background: var(--accent); animation: dance 1s ease infinite; }
        .bar:nth-child(1) { animation-duration: 0.8s; height: 10px; }
        .bar:nth-child(2) { animation-duration: 1.2s; height: 18px; }
        .bar:nth-child(3) { animation-duration: 0.9s; height: 14px; }
        .bar:nth-child(4) { animation-duration: 1.1s; height: 20px; }
        @keyframes dance { 0%, 100% { transform: scaleY(0.5); opacity: 0.5; } 50% { transform: scaleY(1); opacity: 1; } }

        #theme-toggle { padding: 6px 14px; font-size: 0.75rem; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .search-box { width: 100%; margin-bottom: 20px; }
        #search { width: 100%; background: var(--card-bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; outline: none; font-size: 0.95rem; }
        
        .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center; }
        .btn { padding: 8px 16px; background: var(--card-bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 600; }
        .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

       .list{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    margin-bottom:40px;
}

.card{
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    transition:.25s;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(0,0,0,.18);
}

.card img{
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
}

.info{
    padding:10px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
}

.name{
    font-size:.9rem;
    font-weight:700;
    text-align:center;
    line-height:1.3;
}

.price{
    color:var(--accent);
    font-size:.9rem;
    font-weight:800;
}
        footer { text-align: center; padding: 40px 20px; color: #94a3b8; font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 40px; }
    </style>
</head>

    document.getElementById('theme-toggle').addEventListener('click', () => {
        const doc = document.documentElement;
        const theme = doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        doc.setAttribute('data-theme', theme);
    });

    function updateList() {
        const query = document.getElementById('search').value.toLowerCase();
        const activeBtn = document.querySelector('.btn.active');
        const filter = activeBtn ? activeBtn.dataset.filter : 'all';
        const list = document.getElementById('productList');
        
        list.innerHTML = '';
        
        // 검색 로직 개선: 
        // 1. 전체 데이터(allSigs)에서 검색어(query)로 먼저 필터링
        // 2. 그 결과 중에서 선택된 카테고리(filter)에 맞는 것만 정렬해서 표시
      allSigs
.filter(item => {
    const matchesQuery = item.name.toLowerCase().includes(query);
    const matchesFilter = (filter === 'all' || item.category === filter);
    return matchesQuery && matchesFilter;
})
.sort((a, b) => a.price - b.price)
.forEach(item => {

   list.innerHTML += `
<div class="card">
    ${item.imgUrl ? `<img src="${item.imgUrl}" alt="${item.name}">` : ""}

    <div class="info">
        <div class="name">${item.name}</div>
        <div class="price">₩${item.price.toLocaleString()}</div>
    </div>
</div>
`;
});
    }

    function resetAll() {
        document.getElementById('search').value = '';
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-filter="all"]').classList.add('active');
        updateList();
    }

    document.querySelectorAll('.btn').forEach(btn => btn.addEventListener('click', (e) => {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        updateList();
    }));

    document.getElementById('search').addEventListener('input', updateList);
    updateList();
</script>
