<html lang="ko">
<head>

    <title>OCEAN LABEL</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #2D7FF9;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: #333;
            --price-text: #9fb8ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; max-width: 600px; margin: auto; }

        .header-wrap { display:flex; justify-content:space-between; align-items:flex-start; margin:40px 0 35px; }
        .header h1 { font-size:2.5rem; font-weight:900; letter-spacing:-2px; text-transform:uppercase; cursor:pointer; line-height:1;
            background:linear-gradient(90deg, #ffffff 0%, #ffffff 35%, #7fb6ff 50%, #ffffff 65%, #ffffff 100%);
            background-size:250% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:shine 7s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }

        [data-theme='light'] { --bg:#fafafa; --text:#111111; --accent:#2D7FF9; --card-bg:#ffffff; --border:#ececec; --price-text: #555555; }
        [data-theme='light'] .header h1 { background:linear-gradient(90deg, #111111 0%, #111111 35%, #2D7FF9 50%, #111111 65%, #111111 100%); background-size:250% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

.header h1{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:2.5rem;
    font-weight:900;
    letter-spacing:-2px;
    text-transform:uppercase;
    cursor:pointer;
    line-height:1;
    background:linear-gradient(
        90deg,
        #ffffff 0%,
        #ffffff 35%,
        #7fb6ff 50%,
        #ffffff 65%,
        #ffffff 100%
    );
    background-size:250% auto;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shine 7s linear infinite;
}

.live{
    position:relative;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:.65rem;
    letter-spacing:.25em;
    font-weight:700;
    color:var(--accent);
    -webkit-text-fill-color:var(--accent);
    opacity:.9;
}

.live::before{
    content:"";
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 0 rgba(45,127,249,.6);
    animation:livePulse 2s infinite;
}

@keyframes livePulse{
    0%{
        transform:scale(1);
        box-shadow:0 0 0 0 rgba(45,127,249,.6);
    }
    70%{
        transform:scale(1.2);
        box-shadow:0 0 0 10px rgba(45,127,249,0);
    }
    100%{
        transform:scale(1);
        box-shadow:0 0 0 0 rgba(45,127,249,0);
    }
}

        #theme-toggle { background:none; border:none; color:#777; font-size:.72rem; font-weight:700; letter-spacing:.25em; cursor:pointer; padding:0; }
        #theme-toggle:hover { color:var(--text); }
        
        .search-box { width: 100%; margin-bottom: 20px; }
        #search { width:100%; background:transparent; border:none; border-bottom:1px solid rgba(255,255,255,.12); color:var(--text); padding:14px 2px; outline:none; font-size:.95rem; }
        [data-theme='light'] #search { border-bottom:1px solid rgba(0,0,0,.12); }
[data-theme='light'] .live{
    color:#2D7FF9;
    -webkit-text-fill-color:#2D7FF9;
}
        #search:focus { border-bottom-color:#2D7FF9; }
        
        .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center; }
        .btn { padding: 8px 16px; background: var(--card-bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 600; }
        .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .list { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:40px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; transition: .25s ease; display: flex; flex-direction: column; }
        .card:hover { transform:translateY(-2px); border-color:#2D7FF9; }
        .card img { width:100%; aspect-ratio:16/9; object-fit:cover; transition:.35s ease; }
        .card:hover img { transform:scale(1.04); }
.card {
    position: relative;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: .25s ease;
    display: flex;
    flex-direction: column;
}
.card::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        to top,
        rgba(45,127,249,.12),
        transparent 60%
    );
    opacity:0;
    transition:.35s;
    pointer-events:none;
}

.card:hover::after{
    opacity:1;
}

        .info { padding:12px; display:flex; flex-direction:column; align-items:center; gap:6px; flex-grow:1; text-align: center; }
        .name { font-size:.92rem; font-weight:600; line-height:1.45; }
        .price { color: var(--price-text); font-size:.82rem; font-weight:700; letter-spacing:.05em; }
        footer { text-align: center; padding: 40px 20px; color: #94a3b8; font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 40px; }
    </style>
</head>

        document.getElementById('theme-toggle').addEventListener('click', () => {
            const doc = document.documentElement;
            const theme = doc.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            doc.setAttribute('data-theme', theme);
        });

        function updateList() {
            const query = document.getElementById('search').value.toLowerCase();
            const activeBtn = document.querySelector('.btn.active');
            const filter = activeBtn ? activeBtn.dataset.filter : 'all';
            const list = document.getElementById('productList');
            list.innerHTML = '';
            
            allSigs.filter(item => {
                const matchesQuery = item.name.toLowerCase().includes(query);
                const matchesFilter = (filter === 'all' || item.category === filter);
                return matchesQuery && matchesFilter;
            })
            .sort((a, b) => a.price - b.price)
            .forEach(item => {
                list.innerHTML += `
                <div class="card">
                    ${item.imgUrl ? `<img src="${item.imgUrl}" alt="${item.name}">` : ""}
                    <div class="info">
                        <div class="name" style="${item.name === 'ALL I WANNA DO (우석)' ? 'font-size:0.78rem;' : ''}">${item.name}</div>
                        <div class="name" style="${item.name === '내일에서 기다릴게 (지구)' ? 'font-size:0.78rem;' : ''}">${item.name}</div>
                        <div class="price">₩${item.price.toLocaleString()}</div>
                    </div>
                </div>`;
            });
        }

        function resetAll() {
            document.getElementById('search').value = '';
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-filter="all"]').classList.add('active');
            updateList();
        }

        document.querySelectorAll('.btn').forEach(btn => btn.addEventListener('click', (e) => {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            updateList();
        }));

        document.getElementById('search').addEventListener('input', updateList);
        updateList();
    </script>
