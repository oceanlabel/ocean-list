    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --bg: #050505; --text: #ffffff; --accent: #2D7FF9; --card-bg: rgba(255, 255, 255, 0.05); --border: #333; }
        [data-theme='light'] { --bg: #f1f5f9; --text: #1e293b; --accent: #312e81; --card-bg: #ffffff; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); padding: 20px; max-width: 600px; margin: auto; }

        .header-wrap { display: flex; justify-content: space-between; align-items: center; margin: 30px 0 20px; }
        .header h1 { font-size: 1.5rem; font-weight: 900; cursor: pointer; background: linear-gradient(90deg, var(--accent), #fff, var(--accent)); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }

        #theme-toggle { padding: 6px 12px; font-size: 0.7rem; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; }
        #search { width: 100%; background: var(--card-bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; margin-bottom: 20px; outline: none; }

        .filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; justify-content: center; }
        .btn { padding: 6px 12px; background: var(--card-bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; cursor: pointer; font-size: 0.75rem; }
        .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        @media (max-width: 500px) { .list { grid-template-columns: 1fr; } }

        .card { background: var(--card-bg); padding: 12px; border-radius: 10px; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .card img { width: 60px; height: 40px; border-radius: 4px; object-fit: cover; }
        .info { display: flex; flex-direction: column; overflow: hidden; }
        .name { font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .price { color: var(--accent); font-weight: 700; font-size: 0.8rem; }

        footer { text-align: center; padding: 40px 0; color: #94a3b8; font-size: 0.75rem; }
    </style>
</head>

    function updateList() {
        const query = document.getElementById('search').value.toLowerCase();
        const filter = document.querySelector('.btn.active').dataset.filter;
        const list = document.getElementById('productList');
        list.innerHTML = '';
        
        allSigs.filter(i => i.name.toLowerCase().includes(query) && (filter === 'all' || i.category === filter))
        .sort((a, b) => a.price - b.price)
        .forEach(item => {
            list.innerHTML += `
            <div class="card">
                ${item.imgUrl ? `<img src="${item.imgUrl}">` : ""}
                <div class="info">
                    <span class="name">${item.name}</span>
                    <span class="price">₩${item.price.toLocaleString()}</span>
                </div>
            </div>`;
        });
    }

    document.getElementById('theme-toggle').onclick = () => {
        const theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
    };

    document.querySelectorAll('.btn').forEach(b => b.onclick = (e) => { 
        document.querySelectorAll('.btn').forEach(x => x.classList.remove('active'));
        e.target.classList.add('active');
        updateList();
    });

    document.getElementById('search').oninput = updateList;
    updateList();
